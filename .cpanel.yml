---
deployment:
  tasks:
    # Deploy child theme — trailing slash on source = sync contents, not the folder itself
    - rsync -a --delete wp-content/themes/alwayshere-child/ /home/bestsale/public_html/wp-content/themes/alwayshere-child/
    # Deploy custom plugin
    - rsync -a --delete wp-content/plugins/alwayshere-core/ /home/bestsale/public_html/wp-content/plugins/alwayshere-core/
